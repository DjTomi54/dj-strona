<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DJ Tomi</title>
<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

body {
    font-family: Arial, sans-serif;
    background: #0d0d0d;
    color: white;
    scroll-behavior: smooth;
}

/* HEADER */
header {
    background: #111;
    padding: 20px;
    text-align: center;
    border-bottom: 2px solid orange;
    position: sticky;
    top: 0;
    z-index: 1000;
}

header h1 {
    color: orange;
    margin-bottom: 10px;
}

nav a {
    color: white;
    margin: 0 15px;
    text-decoration: none;
    font-weight: bold;
    transition: 0.3s;
}

nav a:hover {
    color: orange;
}

/* HERO */
.hero {
    height: 100vh;
    background: linear-gradient(to right, #0d0d0d, #1a1a1a);
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    text-align: center;
