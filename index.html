<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DjTomi</title>

<script src="https://cdn.tailwindcss.com"></script>

<style>
body {
  margin: 0;
  background: #0a0a0a;
  color: white;
  font-family: Arial, sans-serif;
}

.bg-glow {
  position: fixed;
  inset: 0;
  background: radial-gradient(circle at top, rgba(255,140,0,0.12), transparent 55%);
  z-index: -1;
}

/* MENU */
.menu {
  position: fixed;
  top: 0;
  right: 0;
  width: 220px;
  height: 100vh;
  background: rgba(10,10,10,0.97);
  border-left: 1px solid #222;
  transform: translateX(100%);
  transition: 0.3s;
  padding: 20px;
  z-index: 40;
}

.menu.open { transform: translateX(0); }

.btn {
  display: block;
  margin: 12px 0;
  color: #bbb;
  cursor: pointer;
}
.btn:hover { color: orange; }

section { padding: 60px 20px; }

.card {
  background: #111;
  border: 1px solid #222;
  border-radius: 12px;
  padding: 16px;
}

/* PARTY EFFECT */
@keyframes strobe {
  0% { background: red; }
  20% { background: blue; }
  40% { background: lime; }
  60% { background: purple; }
  80% { background: yellow; }
  100% { background: red; }
}

.party-mode {
  animation: strobe 0.15s infinite;
}

/* BUTTON */
.party-btn {
  position: fixed;
  bottom: 20px;
  right: 20px;
  background: #e11d48;
  padding: 14px 18px;
  border-radius: 999px;
  font-weight: bold;
  cursor: pointer;
  z-index: 100;
}

/* MODAL */
#warning {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.9);
  display: none;
  align-items: center;
  justify-content: center;
  z-index: 200;
}

.modal {
  background: #111;
  padding: 20px;
  border-radius: 12px;
  max-width: 320px;
  text-align: center;
}
</style>
</head>

<body>

<div class="bg-glow"></div>

<!-- MENU -->
<button onclick="toggleMenu()" class="fixed top-5 right-5 text-3xl z-50">☰</button>

<div id="menu" class="menu">
  <h2 class="text-orange-500 font-bold mb-6">DjTomi 🎧</h2>
  <div class="btn" onclick="go('about')">O mnie</div>
  <div class="btn" onclick="go('services')">Usługi</div>
  <div class="btn" onclick="go('contact')">Kontakt</div>
  <div class="btn" onclick="openBooking()">Rezerwacja</div>
</div>

<!-- HERO -->
<section class="text-center pt-24">
  <h1 class="text-6xl font-bold text-orange-500">DjTomi</h1>
  <p class="text-gray-400 mt-4">Profesjonalny DJ na każdą imprezę</p>
</section>

<!-- ABOUT -->
<section id="about" class="text-center">
  <h2 class="text-3xl text-orange-500 font-bold">O mnie</h2>
  <p class="text-gray-300 mt-2">
    DJ z pasją — gram eventy, szkoły i imprezy prywatne.
  </p>
</section>

<!-- SERVICES -->
<section id="services" class="text-center">
  <h2 class="text-3xl text-orange-500 font-bold">Usługi</h2>
  <div class="card mt-4">🎉 Imprezy</div>
</section>

<!-- CONTACT -->
<section id="contact" class="text-center">
  <h2 class="text-3xl text-orange-500 font-bold">Kontakt</h2>
</section>

<!-- WARNING -->
<div id="warning">
  <div class="modal">
    <h2 class="text-red-500 font-bold text-xl">⚠️ Ostrzeżenie</h2>
    <p class="text-gray-300 mt-2">
      Migające światła mogą być niebezpieczne.
    </p>
    <p class="mt-3 font-bold">Kontynuować?</p>

    <button onclick="startParty()" class="bg-green-500 px-4 py-2 rounded m-2">TAK</button>
    <button onclick="closeWarning()" class="bg-red-500 px-4 py-2 rounded m-2">NIE</button>
  </div>
</div>

<!-- MUSIC (MACARENA 🔥) -->
<audio id="music" loop>
  <source src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3" type="audio/mpeg">
</audio>

<!-- PARTY BUTTON -->
<div class="party-btn" onclick="showWarning()" id="partyBtn">
🎉 PARTY
</div>

<script>

// MENU
function toggleMenu(){
  document.getElementById("menu").classList.toggle("open");
}

function go(id){
  document.getElementById(id).scrollIntoView({behavior:"smooth"});
}

function openBooking(){
  window.open("https://calendar.app.google/6WZpceQpuBKEJStF6", "_blank");
}

// PARTY
let party = false;
const music = document.getElementById("music");
const warning = document.getElementById("warning");

function showWarning(){
  warning.style.display = "flex";
}

function closeWarning(){
  warning.style.display = "none";
}

function startParty(){
  warning.style.display = "none";
  party = !party;

  if(party){
    music.play().catch(()=>{});
    document.body.classList.add("party-mode");
    document.getElementById("partyBtn").innerText = "⛔ STOP";
  } else {
    music.pause();
    music.currentTime = 0;
    document.body.classList.remove("party-mode");
    document.getElementById("partyBtn").innerText = "🎉 PARTY";
  }
}

</script>

</body>
</html>
