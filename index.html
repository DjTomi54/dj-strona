<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DjTomi PARTY MODE</title>

<script src="https://cdn.tailwindcss.com"></script>

<style>
body {
  margin: 0;
  background: #0a0a0a;
  color: white;
  font-family: Arial, sans-serif;
}

/* COLOR STROBE */
@keyframes strobe {
  0% { background: red; }
  10% { background: blue; }
  20% { background: lime; }
  30% { background: purple; }
  40% { background: yellow; }
  50% { background: cyan; }
  60% { background: hotpink; }
  70% { background: orange; }
  80% { background: white; }
  90% { background: magenta; }
  100% { background: red; }
}

.party-mode {
  animation: strobe 0.2s infinite;
}

/* BUTTON */
.party-btn {
  position: fixed;
  bottom: 20px;
  right: 20px;
  background: #e11d48;
  padding: 14px 18px;
  border-radius: 999px;
  font-weight: bold;
  cursor: pointer;
  z-index: 100;
}
.party-btn:hover {
  background: #be123c;
}

/* MODAL */
#warningBox {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.9);
  display: none;
  align-items: center;
  justify-content: center;
  z-index: 200;
}

.modal {
  background: #111;
  padding: 20px;
  border-radius: 12px;
  text-align: center;
  max-width: 320px;
}

button {
  margin: 5px;
}
</style>
</head>

<body>

<h1 class="text-center mt-20 text-4xl text-orange-500 font-bold">
DJ PARTY MODE
</h1>

<!-- MUSIC -->
<audio id="music" loop>
  <source src="https://cdn.pixabay.com/download/audio/2022/10/16/audio_3b1d1a5f6a.mp3?filename=tech-house-112194.mp3" type="audio/mpeg">
</audio>

<!-- BUTTON -->
<div class="party-btn" onclick="showWarning()">
🎉 PARTY
</div>

<!-- WARNING MODAL -->
<div id="warningBox">
  <div class="modal">
    <h2 class="text-red-500 font-bold text-xl mb-3">⚠️ Ostrzeżenie</h2>

    <p class="text-gray-300 mb-4">
      Efekt zawiera szybkie migające światła i może być nieodpowiedni dla osób z epilepsją lub nadwrażliwością na światło.
    </p>

    <p class="font-bold mb-3">Czy chcesz kontynuować?</p>

    <button onclick="startParty()" class="bg-green-500 px-4 py-2 rounded">
      TAK
    </button>

    <button onclick="closeWarning()" class="bg-red-500 px-4 py-2 rounded">
      NIE
    </button>
  </div>
</div>

<script>

let partyOn = false;

const music = document.getElementById("music");
const warningBox = document.getElementById("warningBox");

function showWarning(){
  warningBox.style.display = "flex";
}

function closeWarning(){
  warningBox.style.display = "none";
}

function startParty(){

  warningBox.style.display = "none";

  partyOn = !partyOn;

  if(partyOn){
    music.play().catch(err => console.log(err));

    document.body.classList.add("party-mode");

    document.querySelector(".party-btn").innerText = "⛔ STOP PARTY";

  } else {
    music.pause();
    music.currentTime = 0;

    document.body.classList.remove("party-mode");

    document.querySelector(".party-btn").innerText = "🎉 PARTY";
  }
}

</script>

</body>
</html>
